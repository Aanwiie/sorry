<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I'm Sorry Bebe</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background-color: #FFC0CB; font-family: sans-serif; overflow-x: hidden; color: white; }
        .font-pacifico { font-family: 'Pacifico', cursive; }
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
        .heart { position: fixed; font-size: 2rem; animation: float 8s infinite linear; z-index: 0; pointer-events: none; }
        .glass-card { 
            background: rgba(0, 0, 0, 0.15); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.4); 
            border-radius: 30px; 
            padding: 40px; 
            text-align: center; 
            max-width: 650px; 
            width: 90%;
            margin: 20px auto;
            position: relative;
            z-index: 10;
        }
        .right-image-container {
            position: fixed;
            right: 40px;
            top: 50%;
            transform: translateY(-50%) rotate(5deg);
            width: 280px;
            border: 8px solid white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            z-index: 5;
        }
        .btn-yes { padding: 15px 30px; background: white; color: #ff6b6b; border: none; border-radius: 15px; font-weight: 900; cursor: pointer; font-size: 1.2rem; margin: 10px; transition: 0.3s; }
        .btn-yes:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .btn-no { padding: 15px 30px; background: rgba(255,255,255,0.2); color: white; border: 2px solid white; border-radius: 15px; font-weight: bold; cursor: pointer; margin: 10px; transition: 0.3s; }
        .btn-no:hover { background: rgba(255,255,255,0.3); }
        @media (max-width: 1200px) {
            .right-image-container { position: relative; right: 0; top: 0; transform: none; margin: 20px auto; display: block; width: 200px; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        function ApologyWebsite() {
            const [forgiven, setForgiven] = React.useState(false);
            const [noClicks, setNoClicks] = React.useState(0);

            return (
                <div style={{ padding: '40px 0' }}>
                    {/* Floating Hearts */}
                    {[...Array(15)].map((_, i) => (
                        <div key={i} className="heart" style={{ left: `${i * 7}%`, animationDelay: `${i * 0.5}s` }}>❤️</div>
                    ))}

                    {/* Image on the Right */}
                    <img src="image.png" alt="Us together" className="right-image-container" />

                    {/* Main Apology Card */}
                    <div className="glass-card">
                        <h1 className="font-pacifico" style={{ fontSize: '3.5rem', marginBottom: '20px' }}>BEBE ! I AM SORRY</h1>
                        {!forgiven ? (
                            <>
                                <p style={{ fontSize: '1.4rem', fontWeight: '600', lineHeight: '1.6', marginBottom: '30px' }}>
                                    I really messed up, and I hate knowing that I upset you. You mean everything to me, and I want to make things right. Can you find it in your heart to forgive me?
                                </p>
                                <div>
                                    <button onClick={() => setForgiven(true)} className="btn-yes">Yes, I forgive you ❤️</button>
                                    <button 
                                        onClick={() => setNoClicks(noClicks + 1)} 
                                        className="btn-no"
                                        style={{ transform: `scale(${Math.max(0.4, 1 - noClicks * 0.1)})` }}
                                    >
                                        {noClicks === 0 ? "Please no 🥺" : noClicks === 1 ? "Are you sure?" : "Pretty please? 🥺"}
                                    </button>
                                </div>
                            </>
                        ) : (
                            <div>
                                <h2 className="font-pacifico" style={{ fontSize: '3rem', marginBottom: '15px' }}>Yay! Thank You! 🎉</h2>
                                <p style={{ fontSize: '1.3rem', fontWeight: '500' }}>I love you so much. Let me make it up to you! 🥰</p>
                            </div>
                        )}
                    </div>

                    {/* 10 Things I Love About You */}
                    <div className="glass-card">
                        <h2 className="font-pacifico" style={{ fontSize: '2.5rem', marginBottom: '25px' }}>10 things I love about you</h2>
                        <ul style={{ textAlign: 'left', listStyle: 'none', padding: 0, fontSize: '1.1rem' }}>
                            {[
                                "1. That you love me", 
                                "2. That you keep up with my shit", 
                                "3. You are handsome", 
                                "4. You are too handsome", 
                                "5. The sex is good", 
                                "6. You always feed me", 
                                "7. You are kind", 
                                "8. You are bholu bandar", 
                                "9. You have me", 
                                "10. You're smart & talented"
                            ].map((item, i) => (
                                <li key={i} style={{ background: 'rgba(255,255,255,0.1)', padding: '12px 15px', margin: '8px 0', borderRadius: '10px', border: '1px solid rgba(255,255,255,0.2)', transition: '0.3s' }} 
                                    onMouseEnter={(e) => e.target.style.background = 'rgba(255,255,255,0.2)'}
                                    onMouseLeave={(e) => e.target.style.background = 'rgba(255,255,255,0.1)'}>
                                    {item}
                                </li>
                            ))}
                        </ul>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ApologyWebsite />);
    </script>
</body>
</html>
